name: mlnd

on:
  push:
    paths:
      - "mlnd/**"
      - ".github/workflows/mlnd.yml"
  pull_request:
    paths:
      - "mlnd/**"
      - ".github/workflows/mlnd.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: mlnd/go.sum

      # Includes internal/flow (SQLite + evidence hash + kind-31250 build) without Anvil or live relays.
      - name: Go test
        working-directory: mlnd
        run: go test ./... -count=1
