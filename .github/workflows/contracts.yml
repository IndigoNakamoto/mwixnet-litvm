name: contracts

on:
  push:
    paths:
      - "contracts/**"
      - ".github/workflows/contracts.yml"
  pull_request:
    paths:
      - "contracts/**"
      - ".github/workflows/contracts.yml"

jobs:
  forge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Forge build
        run: |
          docker run --rm --entrypoint forge \
            -v "$GITHUB_WORKSPACE/contracts:/work" -w /work \
            ghcr.io/foundry-rs/foundry:latest build

      - name: Forge test
        run: |
          docker run --rm --entrypoint forge \
            -v "$GITHUB_WORKSPACE/contracts:/work" -w /work \
            ghcr.io/foundry-rs/foundry:latest test -vv

  slither:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: crytic/slither-action@v0.4.2
        with:
          target: contracts
          fail-on: high
          slither-args: --exclude-dependencies --filter-paths "^src/"
