# TODO: Integrate Slither into this workflow (e.g. crytic/slither-action or Docker `pip install slither-analyzer`
# and `slither /work --fail-none`); tighten to `--fail-high` after triaging findings on `contracts/`.
name: contracts

on:
  push:
    paths:
      - "contracts/**"
      - ".github/workflows/contracts.yml"
  pull_request:
    paths:
      - "contracts/**"
      - ".github/workflows/contracts.yml"

jobs:
  forge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Forge build
        run: |
          docker run --rm --entrypoint forge \
            -v "$GITHUB_WORKSPACE/contracts:/work" -w /work \
            ghcr.io/foundry-rs/foundry:latest build

      - name: Forge test
        run: |
          docker run --rm --entrypoint forge \
            -v "$GITHUB_WORKSPACE/contracts:/work" -w /work \
            ghcr.io/foundry-rs/foundry:latest test -vv

  # Placeholder job — flip `if` to `true` once Slither is wired (see TODO above).
  slither:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Slither not yet enabled; see workflow TODO at top of contracts.yml"
