name: nostr-fixtures

on:
  push:
    paths:
      - "nostr/**"
      - "scripts/mln_nostr_wire.py"
      - ".github/workflows/nostr-fixtures.yml"
  pull_request:
    paths:
      - "nostr/**"
      - "scripts/mln_nostr_wire.py"
      - ".github/workflows/nostr-fixtures.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate MLN Nostr fixtures
        run: python3 nostr/validate_fixtures.py

      - name: Check Python wire helpers match fixture schema
        run: python3 nostr/check_wire_helpers.py
