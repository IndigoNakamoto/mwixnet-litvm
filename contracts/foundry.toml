[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

# Use env when invoking: forge script ... --rpc-url $LITVM_RPC_URL
[rpc_endpoints]
litvm_testnet = "${LITVM_RPC_URL}"

[invariant]
runs = 256
depth = 500
fail_on_revert = true

[fmt]
line_length = 100
