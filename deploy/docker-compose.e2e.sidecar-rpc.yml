# Merge with docker-compose.e2e.yml:
#   docker compose -f deploy/docker-compose.e2e.yml -f deploy/docker-compose.e2e.sidecar-rpc.yml up -d
#
# Sidecar forwards GET/POST to mweb_getBalance / mweb_submitRoute on the host (e.g. bin/mw-rpc-stub :8546).
# See PHASE_3_MWEB_HANDOFF_SLICE.md and scripts/e2e-mweb-handoff-stub.sh.

services:
  mln-sidecar:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["-port", "8080", "-mode", "rpc", "-rpc-url", "http://host.docker.internal:8546"]
